enable
configure terminal
hostname SW4

vlan 10
name HR
vlan 20
name IT
vlan 30
name SALES
vlan 99
name MANAGEMENT
vlan 999
name NATIVE
exit

interface range f0/1-3, g0/1
switchport mode trunk
